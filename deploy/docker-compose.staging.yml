services:
  caddy:
    image: caddy:2.8-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SYNAPSE_STAGING_HTTP_PORT:-18080}:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: synapse-testing:latest
    env_file:
      - ./.env.staging
    command: uvicorn synapse.server:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      grobid:
        condition: service_started
    ports:
      - "127.0.0.1:${SYNAPSE_APP_PORT:-18000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - synapse_testing_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${SYNAPSE_MINIO_API_PORT:-19000}:9000"
      - "127.0.0.1:${SYNAPSE_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - synapse_testing_minio_data:/data
    restart: unless-stopped

  grobid:
    image: ${GROBID_IMAGE:-python:3.12-alpine}
    command: ${GROBID_COMMAND:-python -m http.server 8070}
    restart: unless-stopped

volumes:
  synapse_testing_postgres_data:
  synapse_testing_minio_data:
