name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Prepare environment files
        run: |
          cp .env.example .env
          cp deploy/.env.staging.example deploy/.env.staging

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Validate local compose file
        run: docker compose config >/dev/null

      - name: Validate testing compose file
        run: docker compose --env-file deploy/.env.staging -f deploy/docker-compose.staging.yml config >/dev/null

      - name: Build application image
        run: docker build -t synapse-ci .
